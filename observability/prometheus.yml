global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: self-hosted-minecraft

# Metrics arrive via remote_write from Alloy (--web.enable-remote-write-receiver).
# Prometheus stores them and evaluates rule_files; it does not scrape anything.

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml
