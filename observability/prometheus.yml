global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: self-hosted-minecraft

# Send firing alerts to the external Alertmanager (mc-alertmanager
# container on the selfhosted docker network, exposed on host port 9097).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule groups defining the demo alerts (PaperDown / JVMHeapHigh / TPSDegraded).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: minecraft
    static_configs:
      - targets: ['paper:9225']
        labels:
          server: paper-demo

  - job_name: alloy
    static_configs:
      - targets:
          - 'obs-alloy:12345'

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: eva00

  - job_name: doco-cd
    static_configs:
      - targets: ['doco-cd:9120']
